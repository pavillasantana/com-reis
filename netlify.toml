# ─── Com Réis — Netlify Configuration ─────────────────────────────────────
# Produção: comreis.com
# Staging:  staging.comreis.com
# ───────────────────────────────────────────────────────────────────────────

[build]
  base = "web"
  publish = "dist"
  command = "npm run build"

[build.environment]
  EXPO_PUBLIC_SUPABASE_URL = "https://bwcquemvvqaivsxaclpl.supabase.co"
  EXPO_PUBLIC_SUPABASE_ANON_KEY = "sb_publishable_5QbtKEEs8J4D27sx9nQ5Nw_AHnHtFVu"

# ─── Headers de Segurança ─────────────────────────────────────────────────
# Aplicados em TODAS as páginas

[[headers]]
  for = "/*"

  # Previne XSS
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(self)"

    # HSTS — força HTTPS por 1 ano (inclui subdomínios)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # CSP — Content Security Policy
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://pagead2.googlesyndication.com https://www.googletagmanager.com https://www.google-analytics.com https://js.sentry-cdn.com https://browser.sentry-cdn.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https:;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co https://sentry.io https://*.ingest.us.sentry.io https://brapi.dev https://openexchange.bcb.gov.br https://economia.awesomeapi.com.br;
      frame-src https://pagead2.googlesyndication.com https://tpc.googlesyndication.com;
      base-uri 'self';
      form-action 'self';
    """

# ─── Cache de Assets Estáticos ────────────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

# ─── Redirects ────────────────────────────────────────────────────────────

# Redirecionar www para domínio apex
[[redirects]]
  from = "https://www.comreis.com/*"
  to = "https://comreis.com/:splat"
  status = 301
  force = true

# Redirecionar HTTP para HTTPS
[[redirects]]
  from = "http://comreis.com/*"
  to = "https://comreis.com/:splat"
  status = 301
  force = true

# ─── Admin Panel — Segurança Reforçada ────────────────────────────────────
[[headers]]
  for = "/admin.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate"
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/src/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-store"
